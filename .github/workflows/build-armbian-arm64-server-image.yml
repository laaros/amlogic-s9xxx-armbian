name: Build Armbian arm64 image

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      set_release:
        description: "Select OS Release."
        required: false
        default: "bookworm"
        type: choice
        options:
          - trixie
          - bookworm
          - noble
      armbian_board:
        description: "Select device board."
        required: false
        default: "s905w"
        type: choice
        options:
          - s905w
          - s905x3
          - amlogic
          - all
      armbian_kernel:
        description: "Select kernel version."
        required: false
        default: "6.18.y"
        type: choice
        options:
          - 6.18.y
          - 6.12.y
          - 6.6.y
      armbian_edition:
        description: "Select image edition type."
        required: false
        default: "desktop"
        type: choice
        options:
          - server
          - desktop
      builder_name:
        description: "Set Armbian builder signature."
        required: false
        default: "laar"
        type: choice
        options:
          - laar
          - ophub
      config_board:
        description: "Set the base Armbian board name."
        required: false
        default: "odroidn2"

env:
  TZ: Etc/UTC
  ROOTFS_SCRIPT: compile-kernel/tools/script/docker/build_armbian_rootfs_file.sh

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Custom Kernel from Release
        run: |
          mkdir -p kernel/stable/6.18.21
          cd kernel/stable/6.18.21
          # Pobieranie Twoich plików jądra (muszą być w Release z tagiem v6.18.21-custom)
          # Używamy wildcardów *, aby pobrać wszystkie pliki .deb lub .tar.gz związane z jądrem
          gh release download v6.18.21-custom --repo ${{ github.repository }} --pattern "*" --dir .
          ls -R .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize the build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo pvcreate /dev/loop6
          sudo vgcreate github /dev/loop6
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder

      - name: Download Armbian source code
        id: down
        working-directory: /builder
        run: |
          git clone -q --single-branch --depth=1 --branch=main https://github.com/armbian/build.git build
          ln -sf /builder/build ${{ github.workspace }}/build
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Compile Armbian [ ${{ inputs.set_release }} ]
        id: compile
        working-directory: /builder
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes 2>/dev/null || true
          cd build/
          # Zmieniono BUILD_DESKTOP na dynamiczne w zależności od wyboru
          ./compile.sh RELEASE=${{ inputs.set_release }} BOARD=${{ inputs.config_board }} BRANCH=current \
                       BUILD_MINIMAL=no BUILD_ONLY=default HOST=armbian \
                       BUILD_DESKTOP=${{ inputs.armbian_edition == 'desktop' && 'yes' || 'no' }} \
                       DESKTOP_ENVIRONMENT=xfce DESKTOP_APPGROUPS_SELECTED="base" \
                       EXPERT=yes KERNEL_CONFIGURE=no COMPRESS_OUTPUTIMAGE="sha"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Organize output files
        id: clean
        run: |
          chmod +x ${ROOTFS_SCRIPT}
          ${ROOTFS_SCRIPT} -v ${{ inputs.set_release }} -s true -c true -k true -p arm64
          echo "build_tag=Armbian_${{ inputs.set_release }}_arm64_${{ inputs.armbian_edition }}_laar_$(date +"%Y.%m")" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Rebuild Armbian with Custom Kernel
        uses: ophub/amlogic-s9xxx-armbian@main
        with:
          build_target: armbian
          armbian_path: build/output/images/*.img.gz
          armbian_board: ${{ inputs.armbian_board }}
          armbian_kernel: "6.18.21"           # To musi pasować do nazwy pliku 6.18.21.tar.gz
          auto_kernel: false 
          kernel_repo: "laaros/amlogic-s9xxx-armbian" # Twoje repo
          kernel_usage: "stable"              # To doda przedrostek 'kernel_' do taga, szukając 'kernel_stable'
          armbian_fstype: "ext4"
          builder_name: "laar"

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.build_tag }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### Armbian Build by laar
            - Edition: ${{ inputs.armbian_edition }}
            - Kernel: Custom 6.18.21 (with SDIO patch)
            - User: `root` | Pass: `1234`
